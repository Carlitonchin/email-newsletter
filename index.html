<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brief — the best tech newsletters, distilled daily</title>
    <meta
      name="description"
      content="A daily, AI-curated digest of the software, programming and AI newsletters worth reading — each one distilled into a clear summary and a quick quiz to make the ideas stick."
    />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong color scheme. -->
    <script>
      try {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const dark = stored === 'dark' || ((!stored || stored === 'system') && prefersDark);
        document.documentElement.classList.toggle('dark', dark);
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
